name: Supabase Production Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production-audit
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  audit:
    name: Read-only production audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      EXPECTED_PROJECT_REF: lwpiqshyqzsgwejvmbyo
      CI: "true"

    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: hostinger-static
          fetch-depth: 1
          persist-credentials: false

      - name: Validate audit configuration
        run: |
          set -euo pipefail

          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "::error::GitHub secret SUPABASE_ACCESS_TOKEN is missing."
            exit 1
          fi

          if [[ -z "${SUPABASE_PROJECT_REF:-}" ]]; then
            echo "::error::GitHub secret SUPABASE_PROJECT_REF is missing."
            exit 1
          fi

          if [[ "${SUPABASE_PROJECT_REF}" != "${EXPECTED_PROJECT_REF}" ]]; then
            echo "::error::SUPABASE_PROJECT_REF does not match the FitConnect production project."
            exit 1
          fi

          echo "FitConnect audit configuration validated."

      - name: Query production metadata through Management API
        env:
          AUDIT_RESPONSE: ${{ runner.temp }}/fitconnect-supabase-audit.json
        run: |
          set -euo pipefail

          read -r -d '' AUDIT_SQL <<'SQL' || true
          select json_build_object(
            'tables', (
              select count(*) from pg_catalog.pg_class c
              join pg_catalog.pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public' and c.relkind in ('r', 'p')
            ),
            'views', (
              select count(*) from pg_catalog.pg_class c
              join pg_catalog.pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public' and c.relkind = 'v'
            ),
            'materialized_views', (
              select count(*) from pg_catalog.pg_class c
              join pg_catalog.pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public' and c.relkind = 'm'
            ),
            'indexes', (
              select count(*) from pg_catalog.pg_indexes
              where schemaname = 'public'
            ),
            'functions', (
              select count(*) from pg_catalog.pg_proc p
              join pg_catalog.pg_namespace n on n.oid = p.pronamespace
              where n.nspname = 'public'
            ),
            'triggers', (
              select count(*) from pg_catalog.pg_trigger t
              join pg_catalog.pg_class c on c.oid = t.tgrelid
              join pg_catalog.pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public' and not t.tgisinternal
            ),
            'policies', (
              select count(*) from pg_catalog.pg_policies
              where schemaname = 'public'
            ),
            'extensions', (
              select count(*) from pg_catalog.pg_extension
            ),
            'custom_types', (
              select count(*) from pg_catalog.pg_type t
              join pg_catalog.pg_namespace n on n.oid = t.typnamespace
              where n.nspname = 'public'
                and t.typtype in ('e', 'd', 'c')
                and not exists (
                  select 1 from pg_catalog.pg_class c
                  where c.reltype = t.oid
                )
            ),
            'sequences', (
              select count(*) from pg_catalog.pg_class c
              join pg_catalog.pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public' and c.relkind = 'S'
            ),
            'rls_enabled_tables', (
              select count(*) from pg_catalog.pg_class c
              join pg_catalog.pg_namespace n on n.oid = c.relnamespace
              where n.nspname = 'public'
                and c.relkind in ('r', 'p')
                and c.relrowsecurity
            )
          ) as audit;
          SQL

          payload="$(jq -n --arg query "${AUDIT_SQL}" '{query: $query}')"

          http_status="$(curl \
            --silent \
            --show-error \
            --request POST \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "${payload}" \
            --output "${AUDIT_RESPONSE}" \
            --write-out "%{http_code}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query")"

          unset payload
          unset AUDIT_SQL

          if [[ "${http_status}" != "200" ]]; then
            message="$(jq -r '.message // .error // "Supabase Management API request failed."' "${AUDIT_RESPONSE}" 2>/dev/null || true)"
            echo "::error::Supabase audit failed with HTTP ${http_status}: ${message}"
            exit 1
          fi

          jq -e \
            'type == "array" and length == 1 and .[0].audit != null' \
            "${AUDIT_RESPONSE}" >/dev/null

          echo "Supabase production metadata received successfully."

      - name: Build sanitized audit summary
        env:
          AUDIT_RESPONSE: ${{ runner.temp }}/fitconnect-supabase-audit.json
        run: |
          set -euo pipefail

          python3 <<'PYTHON'
          import json
          import os
          import re
          from pathlib import Path

          response = json.loads(
              Path(os.environ["AUDIT_RESPONSE"]).read_text(encoding="utf-8")
          )
          production = response[0]["audit"]

          patterns = {
              "tables": r"\bcreate\s+table\b",
              "views": r"\bcreate\s+(?:or\s+replace\s+)?view\b",
              "materialized_views": r"\bcreate\s+materialized\s+view\b",
              "indexes": r"\bcreate\s+(?:unique\s+)?index\b",
              "functions": r"\bcreate\s+(?:or\s+replace\s+)?function\b",
              "triggers": r"\bcreate\s+(?:event\s+)?trigger\b",
              "policies": r"\bcreate\s+policy\b",
              "extensions": r"\bcreate\s+extension\b",
              "custom_types": r"\bcreate\s+type\b",
              "sequences": r"\bcreate\s+sequence\b",
          }

          sql_files = sorted(Path("supabase").glob("*.sql"))
          repository_sql = "\n".join(
              path.read_text(encoding="utf-8", errors="replace")
              for path in sql_files
          )
          repository = {
              name: len(re.findall(pattern, repository_sql, re.IGNORECASE))
              for name, pattern in patterns.items()
          }

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("# FitConnect Supabase Production Audit\n\n")
              summary.write("## Connection\n\n")
              summary.write("✅ Supabase Management API connection successful\n\n")
              summary.write(
                  "Only PostgreSQL catalogue metadata was queried. "
                  "No customer records or table contents were accessed.\n\n"
              )

              summary.write("## Production database\n\n")
              summary.write("| Object type | Count |\n")
              summary.write("|---|---:|\n")
              for name, count in production.items():
                  summary.write(
                      f"| {name.replace('_', ' ').title()} | {count} |\n"
                  )

              summary.write("\n## Repository SQL\n\n")
              summary.write(f"SQL files inspected: **{len(sql_files)}**\n\n")
              summary.write("| Object type | Count |\n")
              summary.write("|---|---:|\n")
              for name, count in repository.items():
                  summary.write(
                      f"| {name.replace('_', ' ').title()} | {count} |\n"
                  )

              production_tables = int(production.get("tables", 0))
              rls_tables = int(production.get("rls_enabled_tables", 0))
              if production_tables == rls_tables:
                  rls_result = "✅ All public tables have RLS enabled."
              else:
                  missing = production_tables - rls_tables
                  rls_result = f"⚠️ {missing} public table(s) do not have RLS enabled."

              summary.write("\n## RLS baseline\n\n")
              summary.write(f"{rls_result}\n\n")
              summary.write("## Security\n\n")
              summary.write("- No database password was used.\n")
              summary.write("- No table data was queried.\n")
              summary.write("- No schema dump was created or uploaded.\n")
              summary.write("- No database changes were executed.\n")

          print("Sanitized FitConnect audit summary generated.")
          PYTHON

      - name: Verify repository JavaScript syntax
        run: |
          set -euo pipefail

          checked=0
          failed=0

          while IFS= read -r -d '' file; do
            checked=$((checked + 1))

            if ! node --check "${file}" >/dev/null 2>&1; then
              echo "::error file=${file}::JavaScript syntax validation failed."
              failed=$((failed + 1))
            fi
          done < <(
            find . \
              -path "./.git" -prune -o \
              -path "./node_modules" -prune -o \
              -type f -name "*.js" -print0
          )

          {
            echo ""
            echo "## Repository JavaScript validation"
            echo ""
            echo "- JavaScript files checked: **${checked}**"
            echo "- Syntax errors: **${failed}**"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${failed}" -ne 0 ]]; then
            exit 1
          fi

      - name: Verify repository JSON
        run: |
          set -euo pipefail

          checked=0
          failed=0

          while IFS= read -r -d '' file; do
            checked=$((checked + 1))

            if ! node -e \
              'JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"))' \
              "${file}" >/dev/null 2>&1; then
              echo "::error file=${file}::Invalid JSON."
              failed=$((failed + 1))
            fi
          done < <(
            find . \
              -path "./.git" -prune -o \
              -path "./node_modules" -prune -o \
              -type f -name "*.json" -print0
          )

          {
            echo ""
            echo "## Repository JSON validation"
            echo ""
            echo "- JSON files checked: **${checked}**"
            echo "- Invalid JSON files: **${failed}**"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${failed}" -ne 0 ]]; then
            exit 1
          fi

      - name: Clean temporary audit files
        if: always()
        run: |
          rm -f "${RUNNER_TEMP}/fitconnect-supabase-audit.json"

      - name: Final status
        if: success()
        run: |
          {
            echo ""
            echo "## Final result"
            echo ""
            echo "✅ GitHub, FitConnect and Supabase are connected."
            echo ""
            echo "This audit did not modify the production database."
          } >> "${GITHUB_STEP_SUMMARY}"
