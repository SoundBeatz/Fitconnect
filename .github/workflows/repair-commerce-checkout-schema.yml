name: Repair Commerce Checkout Schema

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type MIGRATE to apply the checkout compatibility migration
        required: true
        type: string

permissions:
  contents: read

jobs:
  migrate:
    if: inputs.confirmation == 'MIGRATE'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hostinger-static
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate deployment credentials
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_DB_PASSWORD"
      - name: Apply checkout compatibility migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --include-all --password "$SUPABASE_DB_PASSWORD"
