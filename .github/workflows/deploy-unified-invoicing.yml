name: Deploy Unified Invoicing

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type FACTUUR to deploy unified invoicing
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: inputs.confirmation == 'FACTUUR'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/unified-invoicing-command-center
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate and deploy unified invoice schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_DB_PASSWORD"
          test -f supabase/migrations/202607220006_unified_invoicing.sql
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD"
