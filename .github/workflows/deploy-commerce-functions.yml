name: Deploy Commerce Payment Functions

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY to publish the Mollie payment functions
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: inputs.confirmation == 'DEPLOY'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hostinger-static
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy payment functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          MOLLIE_API_KEY: ${{ secrets.MOLLIE_API_KEY }}
          FITCONNECT_ORGANIZATION_ID: ${{ secrets.FITCONNECT_ORGANIZATION_ID }}
          CHECKOUT_RETURN_URL: ${{ secrets.CHECKOUT_RETURN_URL }}
          CHECKOUT_ALLOWED_ORIGIN: ${{ secrets.CHECKOUT_ALLOWED_ORIGIN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ORDER_EMAIL_FROM: ${{ secrets.ORDER_EMAIL_FROM }}
          ORDER_EMAIL_REPLY_TO: ${{ secrets.ORDER_EMAIL_REPLY_TO }}
          CUSTOMER_PORTAL_URL: ${{ secrets.CUSTOMER_PORTAL_URL }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$MOLLIE_API_KEY"
          test -n "$FITCONNECT_ORGANIZATION_ID"
          test -n "$CHECKOUT_RETURN_URL"
          test -n "$CHECKOUT_ALLOWED_ORIGIN"
          test -n "$RESEND_API_KEY"
          test -n "$ORDER_EMAIL_FROM"
          test -n "$CUSTOMER_PORTAL_URL"
          supabase secrets set \
            MOLLIE_API_KEY="$MOLLIE_API_KEY" \
            FITCONNECT_ORGANIZATION_ID="$FITCONNECT_ORGANIZATION_ID" \
            CHECKOUT_RETURN_URL="$CHECKOUT_RETURN_URL" \
            CHECKOUT_ALLOWED_ORIGIN="$CHECKOUT_ALLOWED_ORIGIN" \
            RESEND_API_KEY="$RESEND_API_KEY" \
            ORDER_EMAIL_FROM="$ORDER_EMAIL_FROM" \
            ORDER_EMAIL_REPLY_TO="$ORDER_EMAIL_REPLY_TO" \
            CUSTOMER_PORTAL_URL="$CUSTOMER_PORTAL_URL" \
            --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy commerce-create-payment --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy commerce-mollie-webhook --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy commerce-payment-status --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy commerce-address-lookup --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy commerce-kvk-search --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy commerce-update-order --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
