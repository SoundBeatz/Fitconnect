name: Deploy Commerce Payment Functions

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: Confirm deployment of the Mollie payment functions
        required: true
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      MOLLIE_API_KEY: ${{ secrets.MOLLIE_API_KEY }}
      FITCONNECT_ORGANIZATION_ID: ${{ secrets.FITCONNECT_ORGANIZATION_ID }}
      CHECKOUT_RETURN_URL: ${{ secrets.CHECKOUT_RETURN_URL }}
      CHECKOUT_ALLOWED_ORIGIN: ${{ secrets.CHECKOUT_ALLOWED_ORIGIN }}
    steps:
      - name: Validate deployment confirmation
        env:
          DEPLOY_CONFIRMED: ${{ inputs.confirm_deploy }}
        run: |
          if [ "$DEPLOY_CONFIRMED" != "true" ]; then
            echo "::error::Deployment confirmation checkbox must be selected."
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: hostinger-static
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate deployment secrets
        run: |
          missing=0
          for name in \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_PROJECT_REF \
            MOLLIE_API_KEY \
            FITCONNECT_ORGANIZATION_ID \
            CHECKOUT_RETURN_URL \
            CHECKOUT_ALLOWED_ORIGIN
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Repository secret ${name} is missing or empty."
              missing=1
            else
              echo "${name}: available"
            fi
          done
          exit "$missing"
      - name: Deploy payment functions
        run: |
          supabase secrets set \
            MOLLIE_API_KEY="$MOLLIE_API_KEY" \
            FITCONNECT_ORGANIZATION_ID="$FITCONNECT_ORGANIZATION_ID" \
            CHECKOUT_RETURN_URL="$CHECKOUT_RETURN_URL" \
            CHECKOUT_ALLOWED_ORIGIN="$CHECKOUT_ALLOWED_ORIGIN" \
            --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy commerce-create-payment --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy commerce-mollie-webhook --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy commerce-payment-status --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
