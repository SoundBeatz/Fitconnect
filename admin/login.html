<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FitConnect Admin Login</title><link rel="stylesheet" href="admin.css"><style>body{display:grid;place-items:center;min-height:100vh;background:#f4f2ed}.login-card{width:min(460px,calc(100% - 32px));padding:36px;background:#fff;border:1px solid #d7d2ca;border-radius:24px;box-shadow:0 24px 70px rgba(17,18,20,.12)}.login-card h1{margin:20px 0 10px;font-size:42px;letter-spacing:-.05em}.login-card p{color:#62676c;line-height:1.6}.login-card form{display:grid;gap:16px;margin-top:28px}.login-card label{display:grid;gap:8px;font-weight:800}.login-card input{min-height:50px;padding:0 14px;border:1px solid #c9c3ba;border-radius:12px}.login-card button{min-height:52px;border:0;border-radius:999px;background:#f36f21;color:#fff;font-weight:900;cursor:pointer}.message{min-height:22px;color:#a13c00;font-weight:700}</style></head><body><main class="login-card"><a class="brand" href="../"><span class="brand-mark">FC</span><span>FitConnect</span></a><h1>Beveiligd beheer</h1><p>Log in met uw FitConnect admin-account.</p><form id="loginForm"><label>E-mailadres<input name="email" type="email" autocomplete="email" required></label><label>Wachtwoord<input name="password" type="password" autocomplete="current-password" required></label><button type="submit">Inloggen</button><div class="message" id="message"></div></form></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../shared/supabase-config.js"></script><script>const client=window.getFitConnectSupabase();const form=document.getElementById('loginForm'),msg=document.getElementById('message');if(!client)msg.textContent='Supabase is nog niet geconfigureerd.';else client.auth.getSession().then(({data})=>{if(data.session)location.href='./'});form.addEventListener('submit',async e=>{e.preventDefault();if(!client)return;msg.textContent='Bezig met inloggen…';const fd=new FormData(form);const {data,error}=await client.auth.signInWithPassword({email:fd.get('email'),password:fd.get('password')});if(error){msg.textContent=error.message;return}const {data:profile}=await client.from('profiles').select('role').eq('id',data.user.id).single();if(profile?.role!=='admin'){await client.auth.signOut();msg.textContent='Dit account heeft geen beheerrechten.';return}location.href='./'});</script></body></html>
